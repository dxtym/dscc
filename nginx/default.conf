upstream django {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name dscc-shop-00019248.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dscc-shop-00019248.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/dscc-shop-00019248.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dscc-shop-00019248.duckdns.org/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://django;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
